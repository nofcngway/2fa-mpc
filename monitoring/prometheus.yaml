global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "auth-service"
    static_configs:
      - targets: ["auth:9100"]

  - job_name: "twofa-service"
    static_configs:
      - targets: ["twofa:9101"]

  - job_name: "mpc-node-1"
    static_configs:
      - targets: ["mpc-node-1:9210"]

  - job_name: "mpc-node-2"
    static_configs:
      - targets: ["mpc-node-2:9211"]

  - job_name: "mpc-node-3"
    static_configs:
      - targets: ["mpc-node-3:9212"]

  - job_name: "gateway"
    static_configs:
      - targets: ["gateway:9103"]
