global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "auth-service"
    static_configs:
      - targets: ["host.docker.internal:9100"]

  - job_name: "twofa-service"
    static_configs:
      - targets: ["host.docker.internal:9101"]

  - job_name: "mpc-node-1"
    static_configs:
      - targets: ["host.docker.internal:9102"]

  - job_name: "gateway"
    static_configs:
      - targets: ["host.docker.internal:9103"]
