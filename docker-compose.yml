# Development-only configuration. Do NOT use these credentials in production.

services:
  # ── Infrastructure ──────────────────────────────────────────

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  mpc-postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: mpc_db_1
      POSTGRES_USER: mpc_user
      POSTGRES_PASSWORD: mpc_pass
    volumes:
      - mpc-pg-data:/var/lib/postgresql/data
      - ./scripts/init-mpc-dbs.sql:/docker-entrypoint-initdb.d/init-mpc-dbs.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mpc_user -d mpc_db_1"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:8
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  kafka:
    image: apache/kafka:4.1.2
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "mpc-2fa-dev-cluster-001"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-init:
    image: apache/kafka:4.1.2
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic auth-events --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic twofa-events --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic mpc-events --partitions 1 --replication-factor 1
        echo "All topics created."
    restart: "no"

  # Internal-only — no host port exposure. Reach via `docker compose exec` or
  # connect through Gateway/Prometheus from inside the docker network.
  kafka-ui:
    image: kafbat/kafka-ui:latest
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: mpc-2fa
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: "true"

  # ── Monitoring ──────────────────────────────────────────────

  # Prometheus is only consumed by the Gateway's monitoring snapshot endpoint
  # and by Grafana — both inside the docker network. No host port.
  prometheus:
    image: prom/prometheus:main
    volumes:
      - ./monitoring/prometheus.yaml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - kafka

  # Grafana is exposed on host port 3001 for ops dashboards. The user-facing
  # monitoring view is the /monitoring page in the frontend; Grafana is for
  # operators inspecting raw Prometheus dashboards.
  grafana:
    image: grafana/grafana:main
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  # ── PKI bootstrap (init container) ──────────────────────────
  # Generates the dev mTLS certificates used by every service. Idempotent —
  # the script skips files already present in ./certs, so subsequent
  # `docker compose up` calls return in milliseconds. Force regeneration with:
  #   docker compose run --rm certgen bash /work/scripts/gen-certs.sh --force
  certgen:
    image: alpine:3.20
    volumes:
      - ./certs:/work/certs
      - ./scripts:/work/scripts:ro
    working_dir: /work
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apk add --no-cache --quiet bash openssl >/dev/null &&
        bash scripts/gen-certs.sh
    restart: "no"

  # ── Application Services ────────────────────────────────────

  auth:
    build:
      context: ./auth
      dockerfile: Dockerfile
    depends_on:
      certgen:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - AUTH_SERVER_PORT=9090
      - AUTH_SERVER_METRICS_PORT=9100
      - AUTH_SERVER_LOG_LEVEL=info
      - AUTH_DATABASE_DSN=postgres://auth_user:auth_pass@postgres:5432/auth_db?sslmode=disable
      - AUTH_REDIS_ADDR=redis:6379
      - AUTH_REDIS_PASSWORD=
      - AUTH_REDIS_DB=0
      - AUTH_KAFKA_BROKERS=kafka:9092
      - AUTH_KAFKA_TOPIC=auth-events
      - AUTH_JWT_PRIVATE_KEY_PATH=/keys/private.pem
      - AUTH_JWT_PUBLIC_KEY_PATH=/keys/public.pem
      - AUTH_JWT_ACCESS_TOKEN_TTL=15m
      - AUTH_JWT_REFRESH_TOKEN_TTL=168h
      - AUTH_TLS_ENABLED=true
      - AUTH_TLS_CERT_FILE=/certs/auth.crt
      - AUTH_TLS_KEY_FILE=/certs/auth.key
      - AUTH_TLS_CA_FILE=/certs/ca.crt
    volumes:
      - ./auth/keys:/keys:ro
      - ./certs:/certs:ro
    # Internal-only: gRPC reached via Gateway, metrics scraped by Prometheus
    # inside the docker network.

  twofa:
    build:
      context: .
      dockerfile: twofa/Dockerfile
    depends_on:
      certgen:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mpc-node-1:
        condition: service_started
      mpc-node-2:
        condition: service_started
      mpc-node-3:
        condition: service_started
    environment:
      - TWOFA_SERVER_PORT=9091
      - TWOFA_SERVER_METRICS_PORT=9101
      - TWOFA_SERVER_LOG_LEVEL=info
      - TWOFA_DATABASE_DSN=postgres://twofa_user:twofa_pass@postgres:5432/twofa_db?sslmode=disable
      - TWOFA_REDIS_ADDR=redis:6379
      - TWOFA_REDIS_PASSWORD=
      - TWOFA_REDIS_DB=1
      - TWOFA_KAFKA_BROKERS=kafka:9092
      - TWOFA_KAFKA_TOPIC=twofa-events
      - TWOFA_MPC_NODES=mpc-node-1:9200,mpc-node-2:9201,mpc-node-3:9202
      - TWOFA_SHARED_SECRET=dev-shared-secret-change-in-production
      - TWOFA_MPC_TIMEOUT=5s
      - TWOFA_TLS_ENABLED=true
      - TWOFA_TLS_CERT_FILE=/certs/twofa.crt
      - TWOFA_TLS_KEY_FILE=/certs/twofa.key
      - TWOFA_TLS_CA_FILE=/certs/ca.crt
    volumes:
      - ./certs:/certs:ro
    # Internal-only: gRPC reached via Gateway, metrics scraped by Prometheus.

  mpc-node-1:
    build:
      context: ./mpc
      dockerfile: Dockerfile
    depends_on:
      certgen:
        condition: service_completed_successfully
      mpc-postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - MPC_SERVER_PORT=9200
      - MPC_SERVER_METRICS_PORT=9210
      - MPC_SERVER_LOG_LEVEL=info
      - MPC_DATABASE_DSN=postgres://mpc_user:mpc_pass@mpc-postgres:5432/mpc_db_1?sslmode=disable
      - MPC_KAFKA_BROKERS=kafka:9092
      - MPC_KAFKA_TOPIC=mpc-events
      - MPC_NODE_ID=1
      - MPC_NODE_ENCRYPTION_KEY=0123456789abcdef0123456789abcdef
      - MPC_SHARED_SECRET=dev-shared-secret-change-in-production
      - MPC_TLS_ENABLED=true
      - MPC_TLS_CERT_FILE=/certs/mpc-node-1.crt
      - MPC_TLS_KEY_FILE=/certs/mpc-node-1.key
      - MPC_TLS_CA_FILE=/certs/ca.crt
    volumes:
      - ./certs:/certs:ro

  mpc-node-2:
    build:
      context: ./mpc
      dockerfile: Dockerfile
    depends_on:
      certgen:
        condition: service_completed_successfully
      mpc-postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - MPC_SERVER_PORT=9201
      - MPC_SERVER_METRICS_PORT=9211
      - MPC_SERVER_LOG_LEVEL=info
      - MPC_DATABASE_DSN=postgres://mpc_user:mpc_pass@mpc-postgres:5432/mpc_db_2?sslmode=disable
      - MPC_KAFKA_BROKERS=kafka:9092
      - MPC_KAFKA_TOPIC=mpc-events
      - MPC_NODE_ID=2
      - MPC_NODE_ENCRYPTION_KEY=abcdef0123456789abcdef0123456789
      - MPC_SHARED_SECRET=dev-shared-secret-change-in-production
      - MPC_TLS_ENABLED=true
      - MPC_TLS_CERT_FILE=/certs/mpc-node-2.crt
      - MPC_TLS_KEY_FILE=/certs/mpc-node-2.key
      - MPC_TLS_CA_FILE=/certs/ca.crt
    volumes:
      - ./certs:/certs:ro

  mpc-node-3:
    build:
      context: ./mpc
      dockerfile: Dockerfile
    depends_on:
      certgen:
        condition: service_completed_successfully
      mpc-postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - MPC_SERVER_PORT=9202
      - MPC_SERVER_METRICS_PORT=9212
      - MPC_SERVER_LOG_LEVEL=info
      - MPC_DATABASE_DSN=postgres://mpc_user:mpc_pass@mpc-postgres:5432/mpc_db_3?sslmode=disable
      - MPC_KAFKA_BROKERS=kafka:9092
      - MPC_KAFKA_TOPIC=mpc-events
      - MPC_NODE_ID=3
      - MPC_NODE_ENCRYPTION_KEY=56789abcdef012345678abcdef012345
      - MPC_SHARED_SECRET=dev-shared-secret-change-in-production
      - MPC_TLS_ENABLED=true
      - MPC_TLS_CERT_FILE=/certs/mpc-node-3.crt
      - MPC_TLS_KEY_FILE=/certs/mpc-node-3.key
      - MPC_TLS_CA_FILE=/certs/ca.crt
    volumes:
      - ./certs:/certs:ro

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    depends_on:
      certgen:
        condition: service_completed_successfully
      auth:
        condition: service_started
      twofa:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      - GATEWAY_SERVER_PORT=8080
      - GATEWAY_SERVER_METRICS_PORT=9103
      - GATEWAY_SERVER_LOG_LEVEL=info
      - GATEWAY_AUTH_SERVICE_ADDR=auth:9090
      - GATEWAY_TWOFA_SERVICE_ADDR=twofa:9091
      - GATEWAY_REDIS_ADDR=redis:6379
      - GATEWAY_REDIS_DB=2
      - GATEWAY_PROMETHEUS_URL=http://prometheus:9090
      - GATEWAY_TLS_ENABLED=true
      - GATEWAY_TLS_CERT_FILE=/certs/gateway.crt
      - GATEWAY_TLS_KEY_FILE=/certs/gateway.key
      - GATEWAY_TLS_CA_FILE=/certs/ca.crt
    volumes:
      - ./certs:/certs:ro
    ports:
      # Public REST API. Metrics on :9103 stay internal — Prometheus scrapes
      # them inside the docker network.
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      gateway:
        condition: service_started
    environment:
      - INTERNAL_API_URL=http://gateway:8080
    ports:
      - "3000:3000"

volumes:
  pg-data:
  mpc-pg-data:
  grafana-data:
